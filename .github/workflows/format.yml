name: Format Audit

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Audit scope
        required: false
        default: changed
        type: choice
        options:
          - changed
          - all

env:
  PYTHONUNBUFFERED: 1
  FORCE_COLOR: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Resolve Format Audit Scope
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.manifest.outputs.manifest }}
      has_python: ${{ steps.manifest.outputs.has_python }}
      has_prettier: ${{ steps.manifest.outputs.has_prettier }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: manifest
        name: Build changed manifest
        shell: bash
        run: |
          set -eu
          if [ "${{ github.event.inputs.scope }}" = "all" ]; then
            MANIFEST="$(python scripts/ci/changed_manifest.py --all)"
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="${{ github.event.before }}"
              git diff --name-only "$BASE_SHA" "${{ github.sha }}" > changed_files.txt || true
            else
              git ls-files > changed_files.txt
            fi
            MANIFEST="$(python scripts/ci/changed_manifest.py --changed-files changed_files.txt)"
          fi
          {
            echo "manifest<<EOF"
            echo "$MANIFEST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          MANIFEST_JSON="$MANIFEST" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          payload = json.loads(os.environ["MANIFEST_JSON"])
          print(f"has_python={str(payload.get('has_python_files', False)).lower()}")
          print(f"has_prettier={str(payload.get('has_prettier_files', False)).lower()}")
          PY

  audit-python:
    name: Audit Python Formatting
    needs: validate
    if: needs.validate.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatters
        run: |
          python -m pip install --upgrade pip
          pip install black isort ruff

      - name: Audit changed Python files
        shell: bash
        env:
          MANIFEST_JSON: ${{ needs.validate.outputs.manifest }}
        run: |
          set -eu
          python - <<'PY' > python_targets.txt
          import json
          import os
          payload = json.loads(os.environ["MANIFEST_JSON"])
          for path in payload.get("python_files", []):
              print(path)
          PY
          mapfile -t TARGETS < python_targets.txt
          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "::notice::No Python files to audit."
            exit 0
          fi
          BLACK_STATUS=0
          ISORT_STATUS=0
          RUFF_STATUS=0
          black "${TARGETS[@]}" --check --diff --line-length=120 || BLACK_STATUS=$?
          isort "${TARGETS[@]}" --check --diff --profile=black --line-length=120 --filter-files || ISORT_STATUS=$?
          ruff check "${TARGETS[@]}" --config=ruff.toml || RUFF_STATUS=$?
          {
            echo "### Python format audit"
            echo ""
            echo "- black: $BLACK_STATUS"
            echo "- isort: $ISORT_STATUS"
            echo "- ruff: $RUFF_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$BLACK_STATUS" -ne 0 ] || [ "$ISORT_STATUS" -ne 0 ] || [ "$RUFF_STATUS" -ne 0 ]; then
            echo "::warning::Formatting drift detected in Python targets."
            exit 1
          fi

  audit-prettier:
    name: Audit JS TS JSON YAML Formatting
    needs: validate
    if: needs.validate.outputs.has_prettier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install -g prettier@3.4.2

      - name: Audit changed Prettier targets
        shell: bash
        env:
          MANIFEST_JSON: ${{ needs.validate.outputs.manifest }}
        run: |
          set -eu
          python - <<'PY' > prettier_targets.txt
          import json
          import os
          payload = json.loads(os.environ["MANIFEST_JSON"])
          for path in payload.get("prettier_files", []):
              print(path)
          PY
          mapfile -t TARGETS < prettier_targets.txt
          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "::notice::No Prettier targets to audit."
            exit 0
          fi
          prettier "${TARGETS[@]}" --check --ignore-unknown --log-level warn

  audit-summary:
    name: Format Audit Summary
    needs: [validate, audit-python, audit-prettier]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "### Format Audit Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope resolution | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python audit | ${{ needs.audit-python.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| JS/TS audit | ${{ needs.audit-prettier.result }} |" >> "$GITHUB_STEP_SUMMARY"
